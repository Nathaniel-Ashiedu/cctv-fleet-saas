services:
  db:
    image: postgres:16-alpine
    container_name: cctv_fleet_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cctv_fleet
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cctv_fleet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cctv_fleet_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata: