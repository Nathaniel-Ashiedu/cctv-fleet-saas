name: Backend Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cctv_fleet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cctv_fleet_test
      JWT_SECRET: ci_test_secret_not_for_production
      STRIPE_SECRET_KEY: sk_test_dummy_for_tests_only
      STRIPE_PRICE_ID: price_dummy
      CREDENTIAL_ENCRYPTION_KEY: 376e5720d9c433be7e733c20f3183be5ec924098bc0c584442eaf89ed4b666a6
      FRONTEND_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Load schema into test database
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d cctv_fleet_test -f ../schema.sql

      - name: Run tests
        run: npm run test